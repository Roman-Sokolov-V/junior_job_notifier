services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper
      POSTGRES_DB: vacancies
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d vacancies"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://scraper:scraper@db:5432/vacancies
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "alembic", "upgrade", "head"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://scraper:scraper@db:5432/vacancies
    command: ["uv", "run", "run.py"]
    # Optional: copy .env.docker.example → .env.docker and use:
    #   docker compose --env-file .env.docker up
    # Override for one-off commands, e.g.:
    #   docker compose run --rm app uv run scrapy crawl breezy -O /tmp/out.csv
    # Default: migrations + run.py

volumes:
  pgdata:

networks:
  app_net: